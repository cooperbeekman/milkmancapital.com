<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Milkman Capital</title>
    <style>body { margin: 0; overflow: hidden; background: #000; }</style>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // CONFIG
        const COUNT = 20000;
        const SPEED_MULT = 1;
        const AUTO_SPIN = true;

        // SETUP
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.01);
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(0, 0, 100);

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = AUTO_SPIN;
        controls.autoRotateSpeed = 2.0;

        // POST PROCESSING
        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloomPass.strength = 1.8; bloomPass.radius = 0.4; bloomPass.threshold = 0;
        composer.addPass(bloomPass);

        // SWARM OBJECTS
        const dummy = new THREE.Object3D();
        const color = new THREE.Color();
        const target = new THREE.Vector3();
        const pColor = new THREE.Color();

        // INSTANCED MESH
        const geometry = new THREE.TetrahedronGeometry(0.25);
        const material = new THREE.MeshBasicMaterial({ color: 0xffffff });

        const instancedMesh = new THREE.InstancedMesh(geometry, material, COUNT);
        instancedMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
        scene.add(instancedMesh);

        // DATA ARRAYS
        const positions = [];
        for(let i=0; i<COUNT; i++) {
            positions.push(new THREE.Vector3((Math.random()-0.5)*100, (Math.random()-0.5)*100, (Math.random()-0.5)*100));
            instancedMesh.setColorAt(i, color.setHex(0x00ff88));
        }

        // CONTROL STUBS
        const PARAMS = {"candles":22.2,"scaleY":70,"spreadX":160,"scroll":0.325,"breath":3,"drift":1.2,"orbit":0.19};
        const addControl = (id, label, min, max, val) => {
            return PARAMS[id] !== undefined ? PARAMS[id] : val;
        };
        const setInfo = () => {};
        const annotate = () => {};

        // ANIMATION LOOP
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = clock.getElapsedTime() * SPEED_MULT;

            if(material.uniforms && material.uniforms.uTime) {
                material.uniforms.uTime.value = time;
            }

            controls.update();

            const count = COUNT;
            for(let i=0; i<COUNT; i++) {
                 const numCandles = Math.floor(addControl("candles", "Num Candles",   4,   32,  16));
                 const scaleY     = addControl("scaleY",   "Price Scale",    10,  70,  32);
                 const spreadX    = addControl("spreadX",  "Chart Width",    30,  160, 100);
                 const scrollSpd  = addControl("scroll",   "Scroll Speed",   0,   2.5, 0.3);
                 const breathAmt  = addControl("breath",   "Breath Depth",   0,   8,   3.0);
                 const driftAmt   = addControl("drift",    "Particle Drift", 0,   3,   1.2);
                 const orbitSpd   = addControl("orbit",    "Orbit Speed",    0,   1,   0.18);

                 const ribbonN  = Math.floor(count * 0.06);
                 const candleN  = count - ribbonN;
                 const perC     = Math.floor(candleN / numCandles);

                 const orbitAngle = time * orbitSpd;
                 const cosO = Math.cos(orbitAngle);
                 const sinO = Math.sin(orbitAngle);

                 const globalBreath = Math.sin(time * 0.33) * breathAmt;

                 if (i < candleN) {

                   const ci   = Math.floor(i / perC);
                   const li   = i % perC;
                   const sid  = ci + Math.floor(time * scrollSpd);
                   const seed = sid * 2.3999 + 7.13;

                   const trend  = Math.sin(sid * 0.13) * 0.42
                                + Math.sin(sid * 0.047 + 1.9) * 0.22;
                   const vol    = (Math.sin(seed * 3.7) * 0.5 + 0.5) * 0.2 + 0.06;
                   const move   = Math.sin(seed * 5.31 + 2.0);
                   const bodyH  = (Math.sin(seed * 2.1) * 0.5 + 0.5) * vol;

                   const openP  = trend - bodyH * 0.5;
                   const closeP = trend + bodyH * 0.5 * Math.sign(move);
                   const bull   = closeP > openP;
                   const bodyLo = bull ? openP  : closeP;
                   const bodyHi = bull ? closeP : openP;
                   const highP  = bodyHi + (Math.abs(Math.sin(seed * 4.9))) * vol * 0.7;
                   const lowP   = bodyLo - (Math.abs(Math.sin(seed * 6.3)))  * vol * 0.7;

                   const bodyN  = Math.floor(perC * 0.76);
                   const isBody = li < bodyN;
                   const frac   = isBody
                     ? li / bodyN
                     : (li - bodyN) / Math.max(perC - bodyN, 1);
                   const rawY   = isBody
                     ? (bodyLo + frac * (bodyHi - bodyLo)) * scaleY
                     : (lowP   + frac * (highP  - lowP))   * scaleY;

                   const phase  = ci * 0.44;
                   const bob    = Math.sin(time * 0.52 + phase) * breathAmt * 0.65;

                   const dBody  = driftAmt * (isBody ? 1.0 : 0.15);
                   const jx = (Math.sin(li * 13.7 + seed + time * 0.8)  * 0.55
                             + Math.sin(li *  5.1 + seed + time * 0.31) * 0.45) * dBody;
                   const jy = (Math.sin(li *  8.3 + seed + time * 0.57) * 0.5
                             + Math.sin(li *  3.8 + seed + time * 1.1)  * 0.3) * dBody;
                   const jz =  Math.cos(li *  7.2 + seed + time * 0.43)  * dBody * 0.85;

                   const wx = (ci / numCandles - 0.5) * spreadX + jx;
                   const wy = rawY + bob + globalBreath + jy;
                   const wz = jz;

                   target.set(wx * cosO + wz * sinO, wy, -wx * sinO + wz * cosO);

                   const baseHue    = bull ? 0.36 : 0.97;
                   const bodyCenter = (bodyLo + bodyHi) * 0.5 * scaleY;
                   const distCenter = Math.abs(rawY - bodyCenter) / (Math.max(bodyHi - bodyLo, 0.01) * scaleY);
                   const coreLit    = isBody ? 0.62 - distCenter * 0.28 : 0.30;
                   const iriShift   = frac * 0.04 * (bull ? 1 : -1);
                   const pulse      = Math.sin(time * 0.7 + phase + li * 0.003) * 0.08;
                   color.setHSL(
                     baseHue + iriShift,
                     isBody ? 0.90 : 0.55,
                     coreLit + pulse
                   );

                 } else {

                   const mi     = i - candleN;
                   const mf     = mi / ribbonN;
                   const mSid   = mf * numCandles + time * scrollSpd;
                   const mxRaw  = (mf - 0.5) * spreadX;
                   const mTrend = (Math.sin(mSid * 0.13) * 0.42
                                + Math.sin(mSid * 0.047 + 1.9) * 0.22) * scaleY;
                   const ribT   = (mi % 14) / 14;
                   const ribZ   = (ribT - 0.5) * 4.0;
                   const wave   = Math.sin(mf * 12.56 + time * 1.4) * 0.55;
                   const wy     = mTrend + wave + globalBreath;
                   const wz     = ribZ;

                   target.set(
                     mxRaw * cosO + wz * sinO,
                     wy,
                     -mxRaw * sinO + wz * cosO
                   );

                   const gHue = 0.105 + Math.sin(time * 0.5 + mf * 6.28) * 0.04;
                   const gLit = 0.56 + Math.sin(time * 1.1 + ribT * 6.28) * 0.18;
                   color.setHSL(gHue, 0.96, gLit);
                 }

                 // LERP & UPDATE
                 positions[i].lerp(target, 0.1);
                 dummy.position.copy(positions[i]);
                 dummy.updateMatrix();
                 instancedMesh.setMatrixAt(i, dummy.matrix);
                 instancedMesh.setColorAt(i, color);
            }
            instancedMesh.instanceMatrix.needsUpdate = true;
            instancedMesh.instanceColor.needsUpdate = true;

            composer.render();
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
