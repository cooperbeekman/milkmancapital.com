<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Milkman Capital</title>
<style>
    body { margin: 0; overflow: hidden; background: #000; }
    #hud {
        position: fixed;
        top: 28px;
        right: 32px;
        font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace;
        text-align: right;
        pointer-events: none;
        user-select: none;
        z-index: 10;
    }
    #hud-pair {
        font-size: 10px;
        letter-spacing: 4px;
        color: #444;
        margin-bottom: 6px;
    }
    #hud-price {
        font-size: 26px;
        font-weight: 300;
        color: #e8e8e8;
        letter-spacing: 1px;
    }
    #hud-change {
        font-size: 11px;
        letter-spacing: 1px;
        margin-top: 4px;
    }
    #hud-tf {
        font-size: 9px;
        letter-spacing: 3px;
        color: #333;
        margin-top: 8px;
    }
    .up { color: #4f4; }
    .dn { color: #f44; }
    #price-tag {
        position: fixed;
        font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace;
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 1px;
        padding: 3px 10px;
        pointer-events: none;
        user-select: none;
        z-index: 10;
        white-space: nowrap;
        opacity: 0;
        transition: opacity 0.5s;
    }
    #price-tag.tag-up { background: #0a2a0a; color: #4f4; border: 1px solid rgba(68,255,68,0.25); }
    #price-tag.tag-dn { background: #2a0a0a; color: #f44; border: 1px solid rgba(255,68,68,0.25); }
    #brand {
        position: fixed;
        bottom: 28px;
        left: 32px;
        font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace;
        font-size: 10px;
        letter-spacing: 6px;
        color: #222;
        pointer-events: none;
        user-select: none;
        z-index: 10;
    }
    #nav {
        position: fixed;
        bottom: 28px;
        right: 32px;
        font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace;
        text-align: right;
        z-index: 10;
    }
    #nav .nav-title {
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 5px;
        color: #bbb;
        margin-bottom: 14px;
        text-shadow: 0 0 12px rgba(255,255,255,0.15), 0 0 30px rgba(255,255,255,0.06);
    }
    #nav a {
        display: block;
        font-size: 12px;
        letter-spacing: 3px;
        color: #777;
        text-decoration: none;
        margin-top: 10px;
        text-shadow: 0 0 10px rgba(255,255,255,0.08);
        transition: color 0.3s, text-shadow 0.3s;
    }
    #nav a:hover {
        color: #ddd;
        text-shadow: 0 0 14px rgba(255,255,255,0.25), 0 0 40px rgba(255,255,255,0.1);
    }
</style>
<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
}
</script>
</head>
<body>

<div id="hud">
    <div id="hud-pair">BTC / USD</div>
    <div id="hud-price">&middot;&middot;&middot;</div>
    <div id="hud-change"></div>
    <div id="hud-tf">30S CANDLES &middot; LIVE</div>
</div>

<div id="price-tag"></div>
<div id="nav">
    <div class="nav-title">MM CAPITAL</div>
    <a href="research/">RESEARCH</a>
    <a href="#">INVESTOR LOG IN</a>
</div>
<div id="brand">MILKMAN CAPITAL</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

// ── Config ─────────────────────────────────────────────────────────
const isMobile = innerWidth < 768;
const COUNT = isMobile ? 10000 : 20000;
const CANDLE_MS = 30000;
const MAX_VISIBLE = 22;

// ── Bitcoin Data (Coinbase) ────────────────────────────────────────
let candleHistory = [];
let liveCandle = null;
let latestPrice = 0;
let firstPrice = 0;

function processTick(price, timestamp) {
    latestPrice = price;
    if (!firstPrice) firstPrice = price;

    const bucket = Math.floor(timestamp / CANDLE_MS) * CANDLE_MS;

    if (!liveCandle || liveCandle.t !== bucket) {
        if (liveCandle) {
            candleHistory.push(liveCandle);
            if (candleHistory.length > 200) candleHistory.shift();
        }
        liveCandle = { t: bucket, o: price, h: price, l: price, c: price };
    } else {
        liveCandle.c = price;
        if (price > liveCandle.h) liveCandle.h = price;
        if (price < liveCandle.l) liveCandle.l = price;
    }
}

async function initData() {
    try {
        // Fetch 1-minute candles from Coinbase to seed history
        // Coinbase returns [time, low, high, open, close, volume]
        const res = await fetch(
            'https://api.exchange.coinbase.com/products/BTC-USD/candles?granularity=60'
        );
        if (!res.ok) throw new Error('Coinbase API error');
        const klines = await res.json();

        // Coinbase returns newest first, reverse for chronological order
        klines.reverse();

        // Take last ~15 minutes and split each 1m candle into two 30s candles
        const recent = klines.slice(-15);
        for (const k of recent) {
            const t = k[0] * 1000; // seconds to ms
            const low = k[1];
            const high = k[2];
            const open = k[3];
            const close = k[4];

            // First 30s half: open → midpoint
            const mid = (open + close) / 2;
            const midH = (high + Math.max(open, mid)) / 2;
            const midL = (low + Math.min(open, mid)) / 2;
            const bucket1 = Math.floor(t / CANDLE_MS) * CANDLE_MS;
            if (liveCandle) candleHistory.push(liveCandle);
            liveCandle = { t: bucket1, o: open, h: midH, l: midL, c: mid };

            // Second 30s half: midpoint → close
            const bucket2 = bucket1 + CANDLE_MS;
            candleHistory.push(liveCandle);
            liveCandle = { t: bucket2, o: mid, h: Math.max(mid, high, close), l: Math.min(mid, low, close), c: close };
        }

        if (candleHistory.length > 0) firstPrice = candleHistory[0].o;
    } catch (e) {
        console.warn('Historical seed failed:', e);
    }
    connectWS();
}

function connectWS() {
    const ws = new WebSocket('wss://ws-feed.exchange.coinbase.com');
    ws.onopen = () => {
        ws.send(JSON.stringify({
            type: 'subscribe',
            product_ids: ['BTC-USD'],
            channels: ['ticker']
        }));
    };
    ws.onmessage = (e) => {
        const d = JSON.parse(e.data);
        if (d.type === 'ticker' && d.price) {
            processTick(parseFloat(d.price), new Date(d.time).getTime());
        }
    };
    ws.onerror = () => ws.close();
    ws.onclose = () => setTimeout(connectWS, 3000);
}

initData();

// ── Three.js Setup ─────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000000, isMobile ? 0.004 : 0.01);
const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 1, 1000);
camera.position.set(0, 0, 100);

const renderer = new THREE.WebGLRenderer({ antialias: !isMobile, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(devicePixelRatio, isMobile ? 2 : 3));
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

if (isMobile) camera.position.set(0, 0, 80);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.autoRotate = true;
controls.autoRotateSpeed = isMobile ? 1.2 : 2.0;
controls.minDistance = isMobile ? 40 : 25;
controls.maxDistance = isMobile ? 160 : 300;
controls.enablePan = false;
controls.enableZoom = true;
controls.zoomSpeed = isMobile ? 0.5 : 1.0;
controls.rotateSpeed = isMobile ? 0.5 : 1.0;
controls.touches = { ONE: THREE.TOUCH.ROTATE, TWO: THREE.TOUCH.DOLLY };

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(
    new THREE.Vector2(innerWidth, innerHeight), 1.5, 0.4, 0.85
);
bloom.strength = isMobile ? 1.0 : 1.8;
bloom.radius = isMobile ? 0.2 : 0.4;
bloom.threshold = isMobile ? 0.1 : 0;
composer.addPass(bloom);

// ── Instanced Mesh ─────────────────────────────────────────────────
const dummy = new THREE.Object3D();
const color = new THREE.Color();
const target = new THREE.Vector3();

const geo = new THREE.TetrahedronGeometry(0.25);
const mat = new THREE.MeshBasicMaterial({ color: 0xffffff });
const mesh = new THREE.InstancedMesh(geo, mat, COUNT);
mesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
scene.add(mesh);

const positions = [];
for (let i = 0; i < COUNT; i++) {
    positions.push(new THREE.Vector3(
        (Math.random() - 0.5) * 100,
        (Math.random() - 0.5) * 100,
        (Math.random() - 0.5) * 100
    ));
    mesh.setColorAt(i, color.setHex(0x00ff88));
}

// ── Price Line ─────────────────────────────────────────────────────
const LINE_SEGMENTS = 80;
const linePts = new Float32Array((LINE_SEGMENTS + 1) * 3);
const lineGeo = new THREE.BufferGeometry();
lineGeo.setAttribute('position', new THREE.BufferAttribute(linePts, 3));
const lineMat = new THREE.LineDashedMaterial({
    color: 0x888888,
    dashSize: 1.5,
    gapSize: 1.0,
    transparent: true,
    opacity: 0.35
});
const priceLine = new THREE.Line(lineGeo, lineMat);
priceLine.frustumCulled = false;
scene.add(priceLine);

const projVec = new THREE.Vector3();
const priceTag = document.getElementById('price-tag');

// ── HUD ────────────────────────────────────────────────────────────
const hudPrice = document.getElementById('hud-price');
const hudChange = document.getElementById('hud-change');

function updateHUD() {
    if (latestPrice <= 0) return;
    hudPrice.textContent = '$' + latestPrice.toLocaleString(undefined, {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
    });
    if (firstPrice > 0) {
        const pct = (latestPrice - firstPrice) / firstPrice * 100;
        hudChange.textContent = (pct >= 0 ? '+' : '') + pct.toFixed(3) + '%';
        hudChange.className = pct >= 0 ? 'up' : 'dn';
    }
}

// ── Visual Params ──────────────────────────────────────────────────
const scaleY = 70;
const spreadX = 160;
const breathAmt = 3;
const driftAmt = 1.2;
const orbitSpd = 0.19;

// ── Candle Close Animation State ──────────────────────────────────
let prevHistoryLen = 0;
let closeFlashBucket = -1;
let closeFlashStart = -10;
const focusTarget = new THREE.Vector3();

// ── Animation Loop ─────────────────────────────────────────────────
const clock = new THREE.Clock();
let frameCount = 0;

function animate() {
    requestAnimationFrame(animate);
    clock.getDelta();
    const time = clock.getElapsedTime();

    // Visible candles (computed early for focus target)
    const all = [...candleHistory];
    if (liveCandle) all.push(liveCandle);
    const visible = all.slice(-MAX_VISIBLE);
    const numCandles = visible.length;

    // Detect candle close
    if (candleHistory.length > prevHistoryLen && candleHistory.length > 0) {
        closeFlashBucket = candleHistory[candleHistory.length - 1].t;
        closeFlashStart = time;
        prevHistoryLen = candleHistory.length;
    }

    // Orbit (computed before controls for focus target)
    const orbitAngle = time * orbitSpd;
    const cosO = Math.cos(orbitAngle);
    const sinO = Math.sin(orbitAngle);
    const globalBreath = Math.sin(time * 0.33) * breathAmt;

    // Focus target: between chart center and live candle (closer on mobile)
    if (numCandles > 1) {
        const lastCX = ((numCandles - 1) / numCandles - 0.5) * spreadX;
        const focusBias = isMobile ? 0.75 : 0.4;
        const focusX = lastCX * focusBias;
        focusTarget.set(focusX * cosO, globalBreath * 0.3, -focusX * sinO);
        controls.target.lerp(focusTarget, isMobile ? 0.025 : 0.015);
    }

    controls.update();

    if (numCandles === 0) {
        composer.render();
        return;
    }

    // Price range for normalization
    let pMin = Infinity, pMax = -Infinity;
    for (let k = 0; k < numCandles; k++) {
        if (visible[k].l < pMin) pMin = visible[k].l;
        if (visible[k].h > pMax) pMax = visible[k].h;
    }
    const pRange = pMax - pMin || 1;
    const pMid = (pMax + pMin) * 0.5;

    // Partition particles
    const ribbonN = Math.floor(COUNT * 0.06);
    const candleN = COUNT - ribbonN;
    const perC = Math.max(Math.floor(candleN / numCandles), 1);

    // Flash state
    const flashAge = time - closeFlashStart;
    const flashActive = flashAge < 1.5;

    for (let i = 0; i < COUNT; i++) {

        if (i < candleN) {
            // ── Candle particles ───────────────────────────────────
            let ci = Math.floor(i / perC);
            if (ci >= numCandles) ci = numCandles - 1;
            const li = i % perC;
            const candle = visible[ci];

            const bull = candle.c >= candle.o;

            // Is this candle the one that just closed?
            const isFlashing = flashActive && candle.t === closeFlashBucket;
            const flashIntensity = isFlashing ? Math.exp(-flashAge * 3) : 0;
            const expandFactor = isFlashing ? 1 + Math.exp(-flashAge * 2) * 3 : 1;

            // Normalize OHLC to roughly [-0.5, 0.5]
            const oN = (candle.o - pMid) / pRange;
            const cN = (candle.c - pMid) / pRange;
            const hN = (candle.h - pMid) / pRange;
            const lN = (candle.l - pMid) / pRange;
            const bodyLo = bull ? oN : cN;
            const bodyHi = bull ? cN : oN;

            // Particle layout: 76% body, 24% wick
            const bodyCount = Math.floor(perC * 0.76);
            const isBody = li < bodyCount;
            const frac = isBody
                ? li / bodyCount
                : (li - bodyCount) / Math.max(perC - bodyCount, 1);
            const rawY = isBody
                ? (bodyLo + frac * (bodyHi - bodyLo)) * scaleY
                : (lN + frac * (hN - lN)) * scaleY;

            // Staggered breathing
            const phase = ci * 0.44;
            const bob = Math.sin(time * 0.52 + phase) * breathAmt * 0.65;

            // Organic drift (amplified during flash)
            const seed = ci * 2.3999 + 7.13;
            const dBody = driftAmt * (isBody ? 1.0 : 0.15) * expandFactor;
            const jx = (Math.sin(li * 13.7 + seed + time * 0.8)  * 0.55
                      + Math.sin(li *  5.1 + seed + time * 0.31) * 0.45) * dBody;
            const jy = (Math.sin(li *  8.3 + seed + time * 0.57) * 0.5
                      + Math.sin(li *  3.8 + seed + time * 1.1)  * 0.3) * dBody;
            const jz =  Math.cos(li *  7.2 + seed + time * 0.43) * dBody * 0.85;

            // World position + orbit rotation
            const wx = (ci / numCandles - 0.5) * spreadX + jx;
            const wy = rawY + bob + globalBreath + jy;
            const wz = jz;
            target.set(wx * cosO + wz * sinO, wy, -wx * sinO + wz * cosO);

            // Color: emerald bull, crimson bear
            const baseHue = bull ? 0.36 : 0.97;
            const bodyCenter = (bodyLo + bodyHi) * 0.5 * scaleY;
            const distCenter = Math.abs(rawY - bodyCenter)
                             / (Math.max(bodyHi - bodyLo, 0.01) * scaleY);
            const coreLit  = isBody ? 0.62 - distCenter * 0.28 : 0.30;
            const iriShift = frac * 0.04 * (bull ? 1 : -1);
            const pulse    = Math.sin(time * 0.7 + phase + li * 0.003) * 0.08;
            color.setHSL(
                baseHue + iriShift,
                isBody ? 0.90 : 0.55,
                coreLit + pulse + flashIntensity * 0.4
            );

        } else {
            // ── Gold trend ribbon ──────────────────────────────────
            const mi = i - candleN;
            const mf = mi / ribbonN;
            const mxRaw = (mf - 0.5) * spreadX;

            // Interpolate closing prices across visible candles
            const candlePos = mf * (numCandles - 1);
            const idx0 = Math.floor(candlePos);
            const idx1 = Math.min(idx0 + 1, numCandles - 1);
            const t2 = candlePos - idx0;
            const c0 = (visible[idx0].c - pMid) / pRange;
            const c1 = (visible[idx1].c - pMid) / pRange;
            const interpY = (c0 + (c1 - c0) * t2) * scaleY;

            const ribT = (mi % 14) / 14;
            const ribZ = (ribT - 0.5) * 4.0;
            const wave = Math.sin(mf * 12.56 + time * 1.4) * 0.55;
            const wy = interpY + wave + globalBreath;

            target.set(
                mxRaw * cosO + ribZ * sinO,
                wy,
                -mxRaw * sinO + ribZ * cosO
            );

            const gHue = 0.105 + Math.sin(time * 0.5 + mf * 6.28) * 0.04;
            const gLit = 0.56 + Math.sin(time * 1.1 + ribT * 6.28) * 0.18;
            color.setHSL(gHue, 0.96, gLit);
        }

        // Smooth lerp to target
        positions[i].lerp(target, 0.1);
        dummy.position.copy(positions[i]);
        dummy.updateMatrix();
        mesh.setMatrixAt(i, dummy.matrix);
        mesh.setColorAt(i, color);
    }

    mesh.instanceMatrix.needsUpdate = true;
    mesh.instanceColor.needsUpdate = true;

    // ── Price line across chart at current price ──────────────────
    if (latestPrice > 0 && numCandles > 0) {
        const priceNorm = (latestPrice - pMid) / pRange;
        const bull = liveCandle && latestPrice >= liveCandle.o;

        // Match the live candle's breathing offset so line aligns with body edge
        const lastPhase = (numCandles - 1) * 0.44;
        const lastBob = Math.sin(time * 0.52 + lastPhase) * breathAmt * 0.65;
        const priceY = priceNorm * scaleY + globalBreath + lastBob;

        lineMat.color.setHex(bull ? 0x44ff44 : 0xff4444);
        lineMat.opacity = 0.3;

        // Line from left edge past rightmost candle to the right
        const xStart = -spreadX * 0.55;
        const xEnd = spreadX * 0.6;

        for (let s = 0; s <= LINE_SEGMENTS; s++) {
            const t2 = s / LINE_SEGMENTS;
            const lx = xStart + (xEnd - xStart) * t2;
            const idx = s * 3;
            linePts[idx]     = lx * cosO;
            linePts[idx + 1] = priceY;
            linePts[idx + 2] = -lx * sinO;
        }
        lineGeo.attributes.position.needsUpdate = true;
        priceLine.computeLineDistances();

        // Project right endpoint to screen for price tag
        projVec.set(xEnd * cosO, priceY, -xEnd * sinO);
        projVec.project(camera);

        // Only show tag if it's in front of the camera
        if (projVec.z < 1) {
            const sx = (projVec.x * 0.5 + 0.5) * innerWidth;
            const sy = (-projVec.y * 0.5 + 0.5) * innerHeight;
            priceTag.style.left = sx + 4 + 'px';
            priceTag.style.top = sy + 'px';
            priceTag.style.transform = 'translateY(-50%)';
            priceTag.textContent = '$' + latestPrice.toLocaleString(undefined, {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });
            priceTag.className = bull ? 'tag-up' : 'tag-dn';
            priceTag.style.opacity = '1';
        } else {
            priceTag.style.opacity = '0';
        }

        priceLine.visible = true;
    } else {
        priceLine.visible = false;
        priceTag.style.opacity = '0';
    }

    // Throttle HUD updates
    frameCount++;
    if (frameCount % 10 === 0) updateHUD();

    composer.render();
}

animate();

// ── Resize ─────────────────────────────────────────────────────────
addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
    composer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
