<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Investor Access – MM CAPITAL</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        background: #000;
        color: #c5c8c6;
        font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        font-size: 12px;
    }

    /* ── Function strip ───────────────────────────────────────── */
    .fn {
        display: flex;
        align-items: stretch;
        border-bottom: 1px solid #1a1a1a;
        height: 28px;
        flex-shrink: 0;
    }

    .fn-item {
        display: inline-flex;
        align-items: center;
        padding: 0 14px;
        font-size: 10px;
        letter-spacing: 1px;
        color: #555;
        text-decoration: none;
        border-right: 1px solid #1a1a1a;
        transition: background 0.1s, color 0.1s;
        cursor: pointer;
    }

    .fn-item:hover {
        background: #111;
        color: #ff8800;
    }

    .fn-item.active {
        background: #ff8800;
        color: #000;
        font-weight: 700;
    }

    .fn-fill { flex: 1; border-right: none; }

    .fn-clock {
        display: inline-flex;
        align-items: center;
        padding: 0 14px;
        font-size: 10px;
        letter-spacing: 2px;
        color: #ff8800;
    }

    .rule {
        height: 1px;
        background: #ff8800;
        opacity: 0.6;
    }

    /* ── Command line ─────────────────────────────────────────── */
    .cmd {
        padding: 8px 16px;
        font-size: 11px;
        color: #555;
        border-bottom: 1px solid #111;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .cmd .prompt { color: #ff8800; }
    .cmd .path { color: #888; }

    /* ── Main ──────────────────────────────────────────────────── */
    .main {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .form-wrap {
        width: 100%;
        max-width: 340px;
        padding: 0 24px;
    }

    /* ── Terminal output lines ─────────────────────────────────── */
    .out {
        font-size: 11px;
        color: #444;
        margin-bottom: 24px;
        line-height: 1.8;
    }

    .out .g { color: #00ff66; }
    .out .a { color: #ff8800; }
    .out .w { color: #888; }

    /* ── Fields ────────────────────────────────────────────────── */
    .field {
        margin-bottom: 20px;
    }

    .field-label {
        font-size: 9px;
        letter-spacing: 2px;
        color: #333;
        margin-bottom: 6px;
    }

    .field-input {
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .field-input .gt {
        color: #ff8800;
        font-size: 13px;
        flex-shrink: 0;
    }

    .field-input input {
        width: 100%;
        background: none;
        border: none;
        border-bottom: 1px solid #1a1a1a;
        color: #e8e8e8;
        font-family: inherit;
        font-size: 13px;
        letter-spacing: 2px;
        padding: 6px 0;
        outline: none;
        transition: border-color 0.2s;
    }

    .field-input input:focus {
        border-color: #ff8800;
    }

    .field-input input::placeholder {
        color: #1a1a1a;
    }

    /* ── Button ────────────────────────────────────────────────── */
    .btn {
        width: 100%;
        background: none;
        border: 1px solid #1a1a1a;
        color: #555;
        font-family: inherit;
        font-size: 10px;
        letter-spacing: 4px;
        padding: 10px;
        cursor: pointer;
        transition: background 0.15s, color 0.15s, border-color 0.15s;
        margin-top: 8px;
    }

    .btn:hover {
        background: #ff8800;
        border-color: #ff8800;
        color: #000;
    }

    /* ── Error ─────────────────────────────────────────────────── */
    .err {
        margin-top: 20px;
        font-size: 10px;
        letter-spacing: 2px;
        color: #f44;
        opacity: 0;
        transition: opacity 0.25s;
    }

    .err.visible { opacity: 1; }

    .err-line {
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .err-dot {
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: #f44;
        box-shadow: 0 0 6px rgba(255,68,68,0.5);
        flex-shrink: 0;
    }

    .err-code {
        color: #662222;
        font-size: 9px;
        margin-left: auto;
    }

    /* ── Bottom bar ───────────────────────────────────────────── */
    .bot {
        display: flex;
        align-items: center;
        height: 24px;
        border-top: 1px solid #1a1a1a;
        padding: 0 16px;
        gap: 16px;
        flex-shrink: 0;
    }

    .bot span {
        font-size: 9px;
        letter-spacing: 2px;
        color: #333;
    }

    .bot .dot {
        display: inline-block;
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: #00ff66;
        margin-right: 6px;
        box-shadow: 0 0 4px rgba(0,255,100,0.4);
    }

    .bot .amber { color: #ff8800; opacity: 0.4; }
    .bot-fill { flex: 1; }

    @media (max-width: 480px) {
        .form-wrap { max-width: 100%; }
    }
</style>
</head>
<body>

<div class="fn">
    <a class="fn-item" href="research/">RESEARCH</a>
    <a class="fn-item" href="/">HOME</a>
    <span class="fn-item active">LOGIN</span>
    <span class="fn-item fn-fill"></span>
    <span class="fn-clock" id="clock">00:00:00</span>
</div>
<div class="rule"></div>

<div class="cmd">
    <span class="prompt">MM CAPITAL</span>
    <span class="path">/ INVESTOR ACCESS</span>
</div>

<div class="main">
    <div class="form-wrap">
        <div class="out">
            <span class="g">&gt;</span> <span class="w">connection established</span><br>
            <span class="g">&gt;</span> <span class="w">protocol</span> <span class="a">TLS 1.3</span> <span class="w">cipher</span> <span class="a">AES-256</span><br>
            <span class="g">&gt;</span> <span class="w">awaiting credentials_</span>
        </div>

        <div class="field">
            <div class="field-label">USERNAME</div>
            <div class="field-input">
                <span class="gt">&gt;</span>
                <input type="text" id="username" placeholder="enter username" autocomplete="off" spellcheck="false">
            </div>
        </div>
        <div class="field">
            <div class="field-label">PASSWORD</div>
            <div class="field-input">
                <span class="gt">&gt;</span>
                <input type="password" id="password" placeholder="enter password" autocomplete="off">
            </div>
        </div>
        <button class="btn" id="loginBtn">AUTHENTICATE</button>

        <div class="err" id="errMsg">
            <div class="err-line">
                <span class="err-dot"></span>
                ACCESS DENIED
                <span class="err-code">ERR 401</span>
            </div>
        </div>
    </div>
</div>

<div class="bot">
    <span><span class="dot"></span>ENCRYPTED</span>
    <span>ATTEMPTS <span id="att">0</span></span>
    <span class="bot-fill"></span>
    <span class="amber">MM CAPITAL</span>
</div>

<script>
    var att = 0;
    function tick() {
        var n = new Date();
        document.getElementById('clock').textContent =
            String(n.getUTCHours()).padStart(2,'0') + ':' +
            String(n.getUTCMinutes()).padStart(2,'0') + ':' +
            String(n.getUTCSeconds()).padStart(2,'0') + ' UTC';
    }
    tick(); setInterval(tick, 1000);

    document.getElementById('loginBtn').addEventListener('click', function() {
        att++;
        document.getElementById('att').textContent = att;
        var e = document.getElementById('errMsg');
        e.classList.remove('visible');
        setTimeout(function() { e.classList.add('visible'); }, 50);
    });
    document.getElementById('username').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') document.getElementById('loginBtn').click();
    });
    document.getElementById('password').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') document.getElementById('loginBtn').click();
    });
</script>

</body>
</html>
