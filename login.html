<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Investor Access – MM CAPITAL</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        background: #000;
        color: #999;
        font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .container {
        width: 100%;
        max-width: 380px;
        padding: 0 24px;
    }

    .back {
        display: inline-block;
        color: #333;
        text-decoration: none;
        font-size: 10px;
        letter-spacing: 3px;
        margin-bottom: 48px;
        transition: color 0.2s;
    }

    .back:hover {
        color: #ff8800;
    }

    .brand {
        font-size: 10px;
        letter-spacing: 5px;
        color: #333;
        margin-bottom: 12px;
    }

    h1 {
        font-size: 22px;
        font-weight: 300;
        letter-spacing: 6px;
        color: #e8e8e8;
        margin-bottom: 48px;
    }

    /* ── Form ────────────────────────────────────────────────── */
    .field {
        margin-bottom: 24px;
    }

    .field label {
        display: block;
        font-size: 9px;
        letter-spacing: 3px;
        color: #444;
        margin-bottom: 8px;
    }

    .field input {
        width: 100%;
        background: transparent;
        border: none;
        border-bottom: 1px solid #222;
        color: #e8e8e8;
        font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace;
        font-size: 14px;
        letter-spacing: 2px;
        padding: 10px 0;
        outline: none;
        transition: border-color 0.2s;
    }

    .field input:focus {
        border-color: #ff8800;
    }

    .field input::placeholder {
        color: #1a1a1a;
    }

    .btn {
        width: 100%;
        background: transparent;
        border: 1px solid #222;
        color: #666;
        font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace;
        font-size: 11px;
        font-weight: 400;
        letter-spacing: 5px;
        padding: 14px;
        cursor: pointer;
        transition: border-color 0.2s, color 0.2s;
        margin-top: 12px;
    }

    .btn:hover {
        border-color: #ff8800;
        color: #ff8800;
    }

    /* ── Error ───────────────────────────────────────────────── */
    .error {
        margin-top: 24px;
        font-size: 10px;
        letter-spacing: 3px;
        color: #ff3333;
        opacity: 0;
        transition: opacity 0.3s;
    }

    .error.visible {
        opacity: 1;
    }

    @media (max-width: 480px) {
        h1 {
            font-size: 18px;
            letter-spacing: 4px;
        }
    }
</style>
</head>
<body>

<div class="container">
    <a href="/" class="back">&larr; HOME</a>
    <div class="brand">MM CAPITAL</div>
    <h1>INVESTOR ACCESS</h1>

    <div class="field">
        <label>USERNAME</label>
        <input type="text" id="username" placeholder="enter username" autocomplete="off" spellcheck="false">
    </div>
    <div class="field">
        <label>PASSWORD</label>
        <input type="password" id="password" placeholder="enter password" autocomplete="off">
    </div>
    <button class="btn" id="loginBtn">LOG IN</button>

    <div class="error" id="errorMsg">ACCESS DENIED</div>
</div>

<script>
    document.getElementById('loginBtn').addEventListener('click', function() {
        var err = document.getElementById('errorMsg');
        err.classList.remove('visible');
        setTimeout(function() { err.classList.add('visible'); }, 50);
    });
    document.getElementById('username').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') document.getElementById('loginBtn').click();
    });
    document.getElementById('password').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') document.getElementById('loginBtn').click();
    });
</script>

</body>
</html>
