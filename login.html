<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Investor Access – MM CAPITAL</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        background: #0a0e14;
        color: #c5c8c6;
        font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        font-size: 12px;
    }

    /* ── Top Function Bar ─────────────────────────────────────── */
    .fn-bar {
        background: #1a1e24;
        border-bottom: 1px solid #2a2e34;
        padding: 0 16px;
        display: flex;
        align-items: center;
        height: 32px;
        gap: 2px;
        flex-shrink: 0;
    }

    .fn-key {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 0 10px;
        height: 22px;
        font-size: 10px;
        letter-spacing: 1px;
        color: #666;
        cursor: pointer;
        transition: all 0.15s;
        border-radius: 2px;
        text-decoration: none;
    }

    .fn-key:hover {
        background: #ff8800;
        color: #000;
    }

    .fn-key.active {
        background: #ff8800;
        color: #000;
        font-weight: 700;
    }

    .fn-key kbd {
        font-family: inherit;
        font-size: 9px;
        background: rgba(255,255,255,0.06);
        padding: 1px 4px;
        border-radius: 2px;
        color: #888;
    }

    .fn-key:hover kbd,
    .fn-key.active kbd {
        background: rgba(0,0,0,0.2);
        color: #000;
    }

    .fn-spacer { flex: 1; }

    .fn-bar .clock {
        font-size: 11px;
        color: #ff8800;
        letter-spacing: 2px;
        font-weight: 700;
    }

    /* ── Header Strip ─────────────────────────────────────────── */
    .header-strip {
        background: #12161c;
        border-bottom: 2px solid #ff8800;
        padding: 12px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-shrink: 0;
    }

    .header-left {
        display: flex;
        align-items: center;
        gap: 16px;
    }

    .header-strip .brand {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 4px;
        color: #ff8800;
    }

    .header-strip .page-id {
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 3px;
        color: #fff;
    }

    .header-strip .separator {
        color: #333;
        font-size: 18px;
    }

    .header-right {
        display: flex;
        align-items: center;
        gap: 20px;
    }

    .tag {
        font-size: 9px;
        letter-spacing: 2px;
        padding: 3px 8px;
        border-radius: 2px;
    }

    .tag-green {
        background: rgba(0,255,100,0.08);
        border: 1px solid rgba(0,255,100,0.2);
        color: #00ff66;
    }

    .tag-red {
        background: rgba(255,50,50,0.08);
        border: 1px solid rgba(255,50,50,0.2);
        color: #ff4444;
    }

    .tag-amber {
        background: rgba(255,136,0,0.08);
        border: 1px solid rgba(255,136,0,0.2);
        color: #ff8800;
    }

    /* ── Main Layout ───────────────────────────────────────────── */
    .main {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
    }

    .login-panel {
        width: 100%;
        max-width: 480px;
    }

    /* ── Panel Container ──────────────────────────────────────── */
    .panel {
        border: 1px solid #1e2228;
        background: #12161c;
    }

    .panel-header {
        background: #1a1e24;
        border-bottom: 1px solid #2a2e34;
        padding: 10px 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
    }

    .panel-header .panel-title {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 3px;
        color: #ff8800;
    }

    .panel-header .panel-badge {
        font-size: 8px;
        letter-spacing: 2px;
        color: #00ff66;
        display: flex;
        align-items: center;
        gap: 6px;
    }

    .panel-header .panel-dot {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: #00ff66;
        box-shadow: 0 0 6px rgba(0,255,100,0.4);
        animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
    }

    .panel-body {
        padding: 24px 20px;
    }

    /* ── Terminal Prompt ───────────────────────────────────────── */
    .terminal-line {
        font-size: 11px;
        color: #555;
        margin-bottom: 20px;
        line-height: 1.6;
    }

    .terminal-line .prompt {
        color: #00ff66;
    }

    .terminal-line .cmd {
        color: #aaa;
    }

    .cursor-blink {
        display: inline-block;
        width: 7px;
        height: 13px;
        background: #ff8800;
        vertical-align: middle;
        margin-left: 4px;
        animation: blink 1s step-end infinite;
    }

    @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
    }

    /* ── Form Fields ──────────────────────────────────────────── */
    .field {
        margin-bottom: 20px;
    }

    .field-row {
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .field label {
        display: block;
        font-size: 9px;
        letter-spacing: 3px;
        color: #ff8800;
        margin-bottom: 8px;
        font-weight: 600;
    }

    .field-prefix {
        font-size: 12px;
        color: #333;
        flex-shrink: 0;
    }

    .field input {
        width: 100%;
        background: #0a0e14;
        border: 1px solid #2a2e34;
        color: #fff;
        font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace;
        font-size: 13px;
        letter-spacing: 2px;
        padding: 10px 12px;
        outline: none;
        transition: border-color 0.2s, box-shadow 0.2s;
    }

    .field input:focus {
        border-color: #ff8800;
        box-shadow: 0 0 0 1px rgba(255,136,0,0.15), inset 0 0 12px rgba(255,136,0,0.03);
    }

    .field input::placeholder {
        color: #2a2e34;
        letter-spacing: 1px;
    }

    /* ── Submit Button ─────────────────────────────────────────── */
    .submit-btn {
        width: 100%;
        background: #1a1e24;
        border: 1px solid #2a2e34;
        color: #888;
        font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 5px;
        padding: 12px;
        cursor: pointer;
        transition: all 0.2s;
        margin-top: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
    }

    .submit-btn:hover {
        background: #ff8800;
        border-color: #ff8800;
        color: #000;
    }

    .submit-btn .arrow {
        transition: transform 0.2s;
    }

    .submit-btn:hover .arrow {
        transform: translateX(3px);
    }

    /* ── Error Message ─────────────────────────────────────────── */
    .error-panel {
        border-top: 1px solid #2a2e34;
        background: #1a1e24;
        padding: 0 20px;
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.3s, padding 0.3s;
    }

    .error-panel.visible {
        max-height: 60px;
        padding: 12px 20px;
    }

    .error-content {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .error-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #ff4444;
        box-shadow: 0 0 8px rgba(255,68,68,0.5);
        flex-shrink: 0;
    }

    .error-text {
        font-size: 10px;
        letter-spacing: 3px;
        color: #ff4444;
        font-weight: 700;
    }

    .error-code {
        font-size: 9px;
        letter-spacing: 2px;
        color: #662222;
        margin-left: auto;
    }

    /* ── Connection Info Panel ──────────────────────────────────── */
    .conn-info {
        border: 1px solid #1e2228;
        background: #12161c;
        margin-top: 12px;
    }

    .conn-header {
        background: #1a1e24;
        border-bottom: 1px solid #1e2228;
        padding: 6px 16px;
        font-size: 9px;
        letter-spacing: 2px;
        color: #555;
        font-weight: 600;
    }

    .conn-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0;
    }

    .conn-cell {
        padding: 8px 16px;
        border-bottom: 1px solid #111419;
        border-right: 1px solid #111419;
        display: flex;
        justify-content: space-between;
    }

    .conn-cell:nth-child(even) {
        border-right: none;
    }

    .conn-label {
        font-size: 9px;
        letter-spacing: 2px;
        color: #444;
    }

    .conn-val {
        font-size: 10px;
        color: #888;
        letter-spacing: 1px;
    }

    .conn-val.green {
        color: #00ff66;
    }

    /* ── Bottom Status Bar ──────────────────────────────────────── */
    .status-bar {
        background: #12161c;
        border-top: 1px solid #2a2e34;
        padding: 0 20px;
        display: flex;
        align-items: center;
        height: 28px;
        gap: 24px;
        flex-shrink: 0;
        margin-top: auto;
    }

    .status-item {
        font-size: 9px;
        letter-spacing: 2px;
        color: #444;
        display: flex;
        align-items: center;
        gap: 6px;
    }

    .status-dot {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: #00ff66;
        box-shadow: 0 0 6px rgba(0,255,100,0.4);
        animation: pulse-dot 2s ease-in-out infinite;
    }

    .status-item .val {
        color: #888;
    }

    .status-spacer { flex: 1; }

    .status-item a {
        color: #555;
        text-decoration: none;
        transition: color 0.15s;
    }

    .status-item a:hover {
        color: #ff8800;
    }

    /* ── Responsive ────────────────────────────────────────────── */
    @media (max-width: 520px) {
        .header-right { display: none; }
        .conn-grid { grid-template-columns: 1fr; }
        .conn-cell { border-right: none; }
        .fn-key kbd { display: none; }
        .login-panel { max-width: 100%; }
    }
</style>
</head>
<body>

<!-- Function Bar -->
<div class="fn-bar">
    <a class="fn-key" href="research/"><kbd>F1</kbd> RESEARCH</a>
    <a class="fn-key" href="/"><kbd>F2</kbd> HOME</a>
    <span class="fn-key active"><kbd>F3</kbd> LOGIN</span>
    <span class="fn-spacer"></span>
    <span class="clock" id="clock">00:00:00</span>
</div>

<!-- Header -->
<div class="header-strip">
    <div class="header-left">
        <span class="brand">MM CAPITAL</span>
        <span class="separator">/</span>
        <span class="page-id">INVESTOR ACCESS</span>
    </div>
    <div class="header-right">
        <span class="tag tag-green">ENCRYPTED</span>
        <span class="tag tag-amber">TLS 1.3</span>
    </div>
</div>

<!-- Main -->
<div class="main">
    <div class="login-panel">
        <!-- Login Panel -->
        <div class="panel">
            <div class="panel-header">
                <span class="panel-title">AUTHENTICATION</span>
                <span class="panel-badge"><span class="panel-dot"></span> SECURE</span>
            </div>
            <div class="panel-body">
                <div class="terminal-line">
                    <span class="prompt">$</span> <span class="cmd">ssh investor@mm-capital</span><span class="cursor-blink"></span>
                </div>

                <div class="field">
                    <label>USERNAME</label>
                    <div class="field-row">
                        <span class="field-prefix">&gt;</span>
                        <input type="text" id="username" placeholder="enter username" autocomplete="off" spellcheck="false">
                    </div>
                </div>
                <div class="field">
                    <label>PASSWORD</label>
                    <div class="field-row">
                        <span class="field-prefix">&gt;</span>
                        <input type="password" id="password" placeholder="enter password" autocomplete="off">
                    </div>
                </div>
                <button class="submit-btn" id="loginBtn">
                    AUTHENTICATE <span class="arrow">&rarr;</span>
                </button>
            </div>

            <!-- Error Panel -->
            <div class="error-panel" id="errorPanel">
                <div class="error-content">
                    <span class="error-dot"></span>
                    <span class="error-text">ACCESS DENIED</span>
                    <span class="error-code">ERR_AUTH_401</span>
                </div>
            </div>
        </div>

        <!-- Connection Info -->
        <div class="conn-info">
            <div class="conn-header">CONNECTION DETAILS</div>
            <div class="conn-grid">
                <div class="conn-cell">
                    <span class="conn-label">PROTOCOL</span>
                    <span class="conn-val">HTTPS/2</span>
                </div>
                <div class="conn-cell">
                    <span class="conn-label">CIPHER</span>
                    <span class="conn-val">AES-256-GCM</span>
                </div>
                <div class="conn-cell">
                    <span class="conn-label">SESSION</span>
                    <span class="conn-val" id="session-id">—</span>
                </div>
                <div class="conn-cell">
                    <span class="conn-label">STATUS</span>
                    <span class="conn-val green">READY</span>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Status Bar -->
<div class="status-bar">
    <span class="status-item"><span class="status-dot"></span> CONNECTED</span>
    <span class="status-item">ATTEMPTS: <span class="val" id="attempt-count">0</span></span>
    <span class="status-item">LATENCY: <span class="val" id="latency">—</span></span>
    <span class="status-spacer"></span>
    <span class="status-item"><a href="/">&larr; HOME</a></span>
</div>

<script>
    var attempts = 0;

    // Clock
    function updateClock() {
        var now = new Date();
        var h = String(now.getUTCHours()).padStart(2, '0');
        var m = String(now.getUTCMinutes()).padStart(2, '0');
        var s = String(now.getUTCSeconds()).padStart(2, '0');
        document.getElementById('clock').textContent = h + ':' + m + ':' + s + ' UTC';
    }
    updateClock();
    setInterval(updateClock, 1000);

    // Random session ID
    function genSessionId() {
        var chars = '0123456789abcdef';
        var id = '';
        for (var i = 0; i < 8; i++) id += chars[Math.floor(Math.random() * 16)];
        return id;
    }
    document.getElementById('session-id').textContent = genSessionId();

    // Simulate latency
    function updateLatency() {
        var ms = Math.floor(Math.random() * 12) + 4;
        document.getElementById('latency').textContent = ms + 'ms';
    }
    updateLatency();
    setInterval(updateLatency, 3000);

    // Login handler
    document.getElementById('loginBtn').addEventListener('click', function() {
        attempts++;
        document.getElementById('attempt-count').textContent = attempts;

        var err = document.getElementById('errorPanel');
        err.classList.remove('visible');
        setTimeout(function() { err.classList.add('visible'); }, 50);

        // Flash session ID on attempt
        document.getElementById('session-id').textContent = genSessionId();
    });

    document.getElementById('username').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') document.getElementById('loginBtn').click();
    });
    document.getElementById('password').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') document.getElementById('loginBtn').click();
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', function(e) {
        if (e.key === 'F1') { e.preventDefault(); window.location = 'research/'; }
        if (e.key === 'F2') { e.preventDefault(); window.location = '/'; }
        if (e.key === 'F3') { e.preventDefault(); }
    });
</script>

</body>
</html>
