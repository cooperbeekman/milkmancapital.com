<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Investor Access – MM CAPITAL</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        background: #000;
        color: #c5c8c6;
        font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    /* ── Fixed corners — matches homepage layout ──────────────── */
    .corner-tl {
        position: fixed;
        top: 28px;
        left: 32px;
        z-index: 10;
    }

    .corner-tl .label {
        font-size: 10px;
        letter-spacing: 4px;
        color: #444;
        margin-bottom: 6px;
    }

    .corner-tl .title {
        font-size: 26px;
        font-weight: 300;
        color: #e8e8e8;
        letter-spacing: 1px;
    }

    .corner-tl .sub {
        font-size: 9px;
        letter-spacing: 3px;
        color: #333;
        margin-top: 8px;
    }

    .corner-br {
        position: fixed;
        bottom: 28px;
        right: 32px;
        text-align: right;
        z-index: 10;
    }

    .corner-br .nav-title {
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 5px;
        color: #bbb;
        margin-bottom: 14px;
        text-shadow: 0 0 12px rgba(255,255,255,0.15), 0 0 30px rgba(255,255,255,0.06);
    }

    .corner-br a {
        display: block;
        font-size: 12px;
        letter-spacing: 3px;
        color: #777;
        text-decoration: none;
        margin-top: 10px;
        text-shadow: 0 0 10px rgba(255,255,255,0.08);
        transition: color 0.3s, text-shadow 0.3s;
    }

    .corner-br a:hover {
        color: #ddd;
        text-shadow: 0 0 14px rgba(255,255,255,0.25), 0 0 40px rgba(255,255,255,0.1);
    }

    /* ── Login form ───────────────────────────────────────────── */
    .login-box {
        width: 100%;
        max-width: 360px;
        padding: 0 24px;
    }

    .field {
        margin-bottom: 28px;
    }

    .field label {
        display: block;
        font-size: 9px;
        letter-spacing: 3px;
        color: #333;
        margin-bottom: 10px;
    }

    .field input {
        width: 100%;
        background: transparent;
        border: none;
        border-bottom: 1px solid #1a1a1a;
        color: #e8e8e8;
        font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace;
        font-size: 14px;
        letter-spacing: 2px;
        padding: 8px 0;
        outline: none;
        transition: border-color 0.3s;
    }

    .field input:focus {
        border-color: #444;
    }

    .field input::placeholder {
        color: #1a1a1a;
    }

    .submit-btn {
        width: 100%;
        background: transparent;
        border: 1px solid #1a1a1a;
        color: #555;
        font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace;
        font-size: 11px;
        font-weight: 400;
        letter-spacing: 5px;
        padding: 14px;
        cursor: pointer;
        transition: border-color 0.3s, color 0.3s, text-shadow 0.3s;
        margin-top: 8px;
    }

    .submit-btn:hover {
        border-color: #444;
        color: #bbb;
        text-shadow: 0 0 12px rgba(255,255,255,0.1);
    }

    /* ── Error ─────────────────────────────────────────────────── */
    .error {
        margin-top: 28px;
        font-size: 10px;
        letter-spacing: 3px;
        color: #f44;
        opacity: 0;
        transition: opacity 0.3s;
        text-shadow: 0 0 12px rgba(255,68,68,0.15);
    }

    .error.visible {
        opacity: 1;
    }

    /* ── Responsive ────────────────────────────────────────────── */
    @media (max-width: 600px) {
        .corner-tl { top: 20px; left: 20px; }
        .corner-br { bottom: 20px; right: 20px; }
        .corner-tl .title { font-size: 20px; }
    }
</style>
</head>
<body>

<!-- Top left -->
<div class="corner-tl">
    <div class="label">MM CAPITAL</div>
    <div class="title">INVESTOR ACCESS</div>
    <div class="sub">SECURE LOGIN</div>
</div>

<!-- Center — login form -->
<div class="login-box">
    <div class="field">
        <label>USERNAME</label>
        <input type="text" id="username" placeholder="enter username" autocomplete="off" spellcheck="false">
    </div>
    <div class="field">
        <label>PASSWORD</label>
        <input type="password" id="password" placeholder="enter password" autocomplete="off">
    </div>
    <button class="submit-btn" id="loginBtn">LOG IN</button>
    <div class="error" id="errorMsg">ACCESS DENIED</div>
</div>

<!-- Bottom right — nav -->
<div class="corner-br">
    <div class="nav-title">MM CAPITAL</div>
    <a href="/">HOME</a>
    <a href="research/">RESEARCH</a>
</div>

<script>
    document.getElementById('loginBtn').addEventListener('click', function() {
        var err = document.getElementById('errorMsg');
        err.classList.remove('visible');
        setTimeout(function() { err.classList.add('visible'); }, 50);
    });
    document.getElementById('username').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') document.getElementById('loginBtn').click();
    });
    document.getElementById('password').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') document.getElementById('loginBtn').click();
    });
</script>

</body>
</html>
