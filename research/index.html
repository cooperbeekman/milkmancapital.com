<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Research – MM CAPITAL</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        background: #000;
        color: #999;
        font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
    }

    .page {
        flex: 1;
        max-width: 720px;
        width: 100%;
        margin: 0 auto;
        padding: 80px 32px 60px;
    }

    .back {
        display: inline-block;
        color: #333;
        text-decoration: none;
        font-size: 10px;
        letter-spacing: 3px;
        margin-bottom: 48px;
        transition: color 0.2s;
    }

    .back:hover {
        color: #ff8800;
    }

    .brand {
        font-size: 10px;
        letter-spacing: 5px;
        color: #333;
        margin-bottom: 12px;
    }

    h1 {
        font-size: 24px;
        font-weight: 300;
        letter-spacing: 8px;
        color: #e8e8e8;
        margin-bottom: 48px;
    }

    .divider {
        border: none;
        border-top: 1px solid #111;
        margin-bottom: 0;
    }

    /* ── Research entries ──────────────────────────────────────── */
    .entry {
        display: block;
        text-decoration: none;
        padding: 28px 0;
        border-bottom: 1px solid #111;
        transition: background 0.15s;
        cursor: pointer;
    }

    .entry:hover {
        background: rgba(255, 136, 0, 0.02);
    }

    .entry:hover .entry-title {
        color: #ff8800;
    }

    .entry-meta {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 8px;
    }

    .entry-date {
        font-size: 10px;
        letter-spacing: 2px;
        color: #444;
    }

    .entry-tag {
        font-size: 9px;
        letter-spacing: 2px;
        color: #ff8800;
        opacity: 0.5;
    }

    .entry-title {
        font-size: 15px;
        font-weight: 400;
        color: #ccc;
        letter-spacing: 1px;
        transition: color 0.2s;
    }

    /* ── Footer ──────────────────────────────────────────────── */
    .foot {
        padding: 24px 32px;
        text-align: center;
        font-size: 9px;
        letter-spacing: 3px;
        color: #222;
    }

    @media (max-width: 480px) {
        .page {
            padding: 48px 20px 40px;
        }
        h1 {
            font-size: 18px;
            letter-spacing: 5px;
        }
    }
</style>
</head>
<body>

<div class="page">
    <a href="../" class="back">&larr; HOME</a>
    <div class="brand">MM CAPITAL</div>
    <h1>RESEARCH</h1>
    <hr class="divider">

    <a href="end-of-qt-nov-2025.pdf" target="_blank" class="entry">
        <div class="entry-meta">
            <span class="entry-date">2025.11.17</span>
            <span class="entry-tag">PDF</span>
        </div>
        <div class="entry-title">The End of QT Is Not What You Think</div>
    </a>

    <a href="liquidity-outlook-nov-2025.pdf" target="_blank" class="entry">
        <div class="entry-meta">
            <span class="entry-date">2025.11.05</span>
            <span class="entry-tag">PDF</span>
        </div>
        <div class="entry-title">Liquidity Outlook</div>
    </a>
</div>

<div class="foot">&copy; MM CAPITAL</div>

</body>
</html>
