<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Research – MM CAPITAL</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        background: #000;
        color: #c5c8c6;
        font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        font-size: 12px;
    }

    .fn {
        display: flex;
        align-items: stretch;
        border-bottom: 1px solid #1a1a1a;
        height: 28px;
        flex-shrink: 0;
    }

    .fn-item {
        display: inline-flex;
        align-items: center;
        padding: 0 14px;
        font-size: 10px;
        letter-spacing: 1px;
        color: #555;
        text-decoration: none;
        border-right: 1px solid #1a1a1a;
        transition: background 0.1s, color 0.1s;
        cursor: pointer;
    }

    .fn-item:hover {
        background: #111;
        color: #00ff66;
    }

    .fn-item.active {
        background: #00ff66;
        color: #000;
        font-weight: 700;
    }

    .fn-fill { flex: 1; border-right: none; }

    .fn-clock {
        display: inline-flex;
        align-items: center;
        padding: 0 14px;
        font-size: 10px;
        letter-spacing: 2px;
        color: #00ff66;
    }

    .rule {
        height: 1px;
        background: #00ff66;
        opacity: 0.6;
    }

    .cmd {
        padding: 8px 16px;
        font-size: 11px;
        color: #555;
        border-bottom: 1px solid #111;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .cmd .prompt { color: #00ff66; }
    .cmd .path { color: #888; }

    .tbl {
        flex: 1;
        overflow-y: auto;
    }

    .tbl-head {
        display: grid;
        grid-template-columns: 36px 100px 50px 1fr 60px;
        padding: 0 16px;
        border-bottom: 1px solid #222;
        position: sticky;
        top: 0;
        background: #000;
        z-index: 2;
    }

    .tbl-head span {
        padding: 7px 0;
        font-size: 9px;
        font-weight: 600;
        letter-spacing: 2px;
        color: #00ff66;
    }

    .tbl-row {
        display: grid;
        grid-template-columns: 36px 100px 50px 1fr 60px;
        padding: 0 16px;
        border-bottom: 1px solid #0a0a0a;
        text-decoration: none;
        color: inherit;
        transition: background 0.1s;
    }

    .tbl-row:hover {
        background: #001a00;
    }

    .tbl-row:hover .r-title { color: #fff; }
    .tbl-row:hover .r-open { opacity: 1; }

    .tbl-row span {
        padding: 10px 0;
        display: flex;
        align-items: center;
    }

    .r-idx { font-size: 10px; color: #2a2a2a; }
    .r-date { font-size: 10px; letter-spacing: 1px; color: #666; }
    .r-type { font-size: 9px; letter-spacing: 1px; color: #00ff66; opacity: 0.5; }
    .r-title { font-size: 12px; color: #aaa; transition: color 0.15s; }
    .r-open { font-size: 9px; letter-spacing: 1px; color: #00ff66; opacity: 0; transition: opacity 0.15s; justify-content: flex-end; }

    .bot {
        display: flex;
        align-items: center;
        height: 24px;
        border-top: 1px solid #1a1a1a;
        padding: 0 16px;
        gap: 16px;
        flex-shrink: 0;
    }

    .bot span { font-size: 9px; letter-spacing: 2px; color: #333; }

    .bot .dot {
        display: inline-block;
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: #00ff66;
        margin-right: 6px;
        box-shadow: 0 0 4px rgba(0,255,100,0.4);
    }

    .bot .grn { color: #00ff66; opacity: 0.4; }
    .bot-fill { flex: 1; }

    @media (max-width: 600px) {
        .tbl-head, .tbl-row {
            grid-template-columns: 36px 80px 1fr;
        }
        .tbl-head span:nth-child(3),
        .tbl-head span:nth-child(5),
        .tbl-row span:nth-child(3),
        .tbl-row span:nth-child(5) {
            display: none;
        }
    }
</style>
</head>
<body>

<div class="fn">
    <span class="fn-item active">RESEARCH</span>
    <a class="fn-item" href="../">HOME</a>
    <a class="fn-item" href="../login.html">LOGIN</a>
    <span class="fn-item fn-fill"></span>
    <span class="fn-clock" id="clock">00:00:00</span>
</div>
<div class="rule"></div>

<div class="cmd">
    <span class="prompt">MM CAPITAL</span>
    <span class="path">/ RESEARCH / ALL</span>
</div>

<div class="tbl">
    <div class="tbl-head">
        <span>#</span>
        <span>DATE</span>
        <span>TYPE</span>
        <span>TITLE</span>
        <span style="justify-content:flex-end">VIEW</span>
    </div>
    <a class="tbl-row" href="Untitled%20document-2.docx" target="_blank">
        <span class="r-idx">01</span>
        <span class="r-date">2026.03.12</span>
        <span class="r-type">DOCX</span>
        <span class="r-title">Strait Update and Outlook</span>
        <span class="r-open">&rarr;</span>
    </a>
    <a class="tbl-row" href="end-of-qt-nov-2025.pdf" target="_blank">
        <span class="r-idx">02</span>
        <span class="r-date">2025.11.17</span>
        <span class="r-type">PDF</span>
        <span class="r-title">The End of QT Is Not What You Think</span>
        <span class="r-open">&rarr;</span>
    </a>
    <a class="tbl-row" href="liquidity-outlook-nov-2025.pdf" target="_blank">
        <span class="r-idx">03</span>
        <span class="r-date">2025.11.05</span>
        <span class="r-type">PDF</span>
        <span class="r-title">Liquidity Outlook</span>
        <span class="r-open">&rarr;</span>
    </a>
</div>

<div class="bot">
    <span><span class="dot"></span>ONLINE</span>
    <span>ROWS 3</span>
    <span class="grn">SORTED DATE DESC</span>
    <span class="bot-fill"></span>
    <span class="grn">MM CAPITAL</span>
</div>

<script>
    function tick() {
        var n = new Date();
        document.getElementById('clock').textContent =
            String(n.getUTCHours()).padStart(2,'0') + ':' +
            String(n.getUTCMinutes()).padStart(2,'0') + ':' +
            String(n.getUTCSeconds()).padStart(2,'0') + ' UTC';
    }
    tick(); setInterval(tick, 1000);
</script>

</body>
</html>
