<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Research – MM CAPITAL</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        background: #000;
        color: #c5c8c6;
        font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace;
        min-height: 100vh;
    }

    /* ── Fixed corners — matches homepage layout ──────────────── */
    .corner-tl {
        position: fixed;
        top: 28px;
        left: 32px;
        z-index: 10;
    }

    .corner-tl .label {
        font-size: 10px;
        letter-spacing: 4px;
        color: #444;
        margin-bottom: 6px;
    }

    .corner-tl .title {
        font-size: 26px;
        font-weight: 300;
        color: #e8e8e8;
        letter-spacing: 1px;
    }

    .corner-tl .sub {
        font-size: 9px;
        letter-spacing: 3px;
        color: #333;
        margin-top: 8px;
    }

    .corner-br {
        position: fixed;
        bottom: 28px;
        right: 32px;
        text-align: right;
        z-index: 10;
    }

    .corner-br .nav-title {
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 5px;
        color: #bbb;
        margin-bottom: 14px;
        text-shadow: 0 0 12px rgba(255,255,255,0.15), 0 0 30px rgba(255,255,255,0.06);
    }

    .corner-br a {
        display: block;
        font-size: 12px;
        letter-spacing: 3px;
        color: #777;
        text-decoration: none;
        margin-top: 10px;
        text-shadow: 0 0 10px rgba(255,255,255,0.08);
        transition: color 0.3s, text-shadow 0.3s;
    }

    .corner-br a:hover {
        color: #ddd;
        text-shadow: 0 0 14px rgba(255,255,255,0.25), 0 0 40px rgba(255,255,255,0.1);
    }

    .corner-bl {
        position: fixed;
        bottom: 28px;
        left: 32px;
        font-size: 10px;
        letter-spacing: 6px;
        color: #222;
        z-index: 10;
    }

    /* ── Research list ─────────────────────────────────────────── */
    .research-list {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 100%;
        max-width: 600px;
        padding: 0 32px;
    }

    .entry {
        display: block;
        text-decoration: none;
        padding: 24px 0;
        border-bottom: 1px solid #111;
        transition: border-color 0.2s;
        cursor: pointer;
    }

    .entry:first-child {
        border-top: 1px solid #111;
    }

    .entry:hover {
        border-color: #333;
    }

    .entry:hover .entry-title {
        color: #fff;
        text-shadow: 0 0 20px rgba(255,255,255,0.1);
    }

    .entry:hover .entry-arrow {
        opacity: 1;
        transform: translateX(0);
    }

    .entry-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 8px;
    }

    .entry-date {
        font-size: 10px;
        letter-spacing: 2px;
        color: #444;
    }

    .entry-type {
        font-size: 9px;
        letter-spacing: 2px;
        color: #333;
    }

    .entry-bottom {
        display: flex;
        align-items: center;
        justify-content: space-between;
    }

    .entry-title {
        font-size: 15px;
        font-weight: 400;
        color: #999;
        letter-spacing: 0.5px;
        transition: color 0.3s, text-shadow 0.3s;
    }

    .entry-arrow {
        font-size: 12px;
        color: #555;
        opacity: 0;
        transform: translateX(-6px);
        transition: opacity 0.2s, transform 0.2s;
        flex-shrink: 0;
        margin-left: 16px;
    }

    /* ── Responsive ────────────────────────────────────────────── */
    @media (max-width: 600px) {
        .corner-tl { top: 20px; left: 20px; }
        .corner-br { bottom: 20px; right: 20px; }
        .corner-bl { bottom: 20px; left: 20px; }
        .corner-tl .title { font-size: 20px; }
        .research-list { padding: 0 20px; }
        .entry-title { font-size: 13px; }
    }
</style>
</head>
<body>

<!-- Top left — page info (mirrors homepage HUD position) -->
<div class="corner-tl">
    <div class="label">MM CAPITAL</div>
    <div class="title">RESEARCH</div>
    <div class="sub">2 PUBLICATIONS</div>
</div>

<!-- Center — research entries -->
<div class="research-list">
    <a class="entry" href="end-of-qt-nov-2025.pdf" target="_blank">
        <div class="entry-top">
            <span class="entry-date">2025.11.17</span>
            <span class="entry-type">PDF</span>
        </div>
        <div class="entry-bottom">
            <span class="entry-title">The End of QT Is Not What You Think</span>
            <span class="entry-arrow">&rarr;</span>
        </div>
    </a>
    <a class="entry" href="liquidity-outlook-nov-2025.pdf" target="_blank">
        <div class="entry-top">
            <span class="entry-date">2025.11.05</span>
            <span class="entry-type">PDF</span>
        </div>
        <div class="entry-bottom">
            <span class="entry-title">Liquidity Outlook</span>
            <span class="entry-arrow">&rarr;</span>
        </div>
    </a>
</div>

<!-- Bottom left — brand (matches homepage) -->
<div class="corner-bl">MILKMAN CAPITAL</div>

<!-- Bottom right — nav (matches homepage) -->
<div class="corner-br">
    <div class="nav-title">MM CAPITAL</div>
    <a href="../">HOME</a>
    <a href="../login.html">INVESTOR LOG IN</a>
</div>

</body>
</html>
